<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>隱私保護小工具 - 文字自動遮蔽</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root {
            --bg-color: #f4f4f9;
            --text-color: #333;
            --card-bg: #fff;
            --primary: #4A90E2;
            --border: #ddd;
        }
        [data-theme="dark"] {
            --bg-color: #1a1a1a;
            --text-color: #f4f4f9;
            --card-bg: #2d2d2d;
            --primary: #5fb0ff;
            --border: #444;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            transition: 0.3s;
        }
        .container { max-width: 900px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="number"], select {
            width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px;
            background: var(--bg-color); color: var(--text-color); box-sizing: border-box;
        }
        button {
            background: var(--primary); color: #fff; border: none; padding: 10px 20px; border-radius: 6px;
            cursor: pointer; font-size: 16px; transition: 0.2s; margin-right: 10px; margin-bottom: 10px;
        }
        button:hover { opacity: 0.8; }
        button:disabled { background: #888; cursor: not-allowed; }
        .upload-area {
            border: 2px dashed var(--border); padding: 40px; text-align: center; border-radius: 12px;
            cursor: pointer; background: var(--bg-color);
        }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .img-card { background: var(--card-bg); border-radius: 8px; padding: 10px; border: 1px solid var(--border); }
        .img-card canvas { max-width: 100%; height: auto; border-radius: 4px; display: block; margin-bottom: 10px; }
        .progress-bar { height: 10px; background: var(--border); border-radius: 5px; overflow: hidden; margin-top: 10px; display: none; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: 0.3s; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>📷 圖片文字自動遮蔽工具</h2>
        <button id="themeToggle">切換深色/淺色</button>
    </div>

    <div class="card">
        <h3>⚙️ 設定區</h3>
        <div class="form-group">
            <label>圖片主要語言</label>
            <select id="lang">
                <option value="chi_tra">繁體中文</option>
                <option value="eng">英文</option>
                <option value="chi_tra+eng">繁中 + 英文</option>
            </select>
        </div>
        <div class="form-group">
            <label>要尋找的關鍵字 (多個請用半形逗號 , 隔開)</label>
            <input type="text" id="keywords" placeholder="例如：身分證號,橙橙,公司名稱" value="">
        </div>
        <div class="form-group">
            <label>遮蔽方式</label>
            <select id="maskType">
                <option value="color">純色色塊 (自動抓取邊緣底色)</option>
                <option value="black">黑色色塊</option>
                <option value="replace">替換成文字 / Emoji</option>
            </select>
        </div>
        <div class="form-group" id="replaceTextGroup" style="display:none;">
            <label>替換文字 (例如：OO 或 ❤️)</label>
            <input type="text" id="replaceText" value="██">
        </div>
        <div class="form-group">
            <label>遮蔽範圍向外擴張 (Padding 像素)</label>
            <input type="number" id="padding" value="2" min="0" max="20">
        </div>
    </div>

    <div class="card">
        <h3>📁 上傳與處理 (最多 20 張)</h3>
        <div class="upload-area" id="uploadArea">
            點擊選擇圖片，或直接在網頁中「貼上 (Ctrl+V / Cmd+V)」
            <input type="file" id="fileInput" multiple accept="image/*" style="display: none;">
        </div>
        <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
        <p id="statusText" style="color: var(--primary); font-weight: bold;"></p>
        
        <button id="processBtn" disabled>開始處理</button>
        <button id="downloadZipBtn" style="display:none; background:#28a745;">下載全部 (ZIP)</button>
    </div>

    <div class="gallery" id="gallery"></div>
</div>

<script>
    // 狀態管理
    let uploadedFiles = [];
    let processedImages = [];
    const maxFiles = 20;

    // DOM 元素
    const themeToggle = document.getElementById('themeToggle');
    const maskTypeSelect = document.getElementById('maskType');
    const replaceTextGroup = document.getElementById('replaceTextGroup');
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const processBtn = document.getElementById('processBtn');
    const gallery = document.getElementById('gallery');
    const statusText = document.getElementById('statusText');
    const progressFill = document.getElementById('progressFill');
    const progressBar = document.getElementById('progressBar');
    const downloadZipBtn = document.getElementById('downloadZipBtn');

    // 主題切換與儲存
    const savedTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
    themeToggle.addEventListener('click', () => {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
    });

    // 遮蔽方式連動
    maskTypeSelect.addEventListener('change', (e) => {
        replaceTextGroup.style.display = e.target.value === 'replace' ? 'block' : 'none';
    });

    // 處理上傳與貼上
    const handleFiles = (files) => {
        const validFiles = Array.from(files).filter(file => file.type.startsWith('image/'));
        if (uploadedFiles.length + validFiles.length > maxFiles) {
            alert(`最多只能處理 ${maxFiles} 張圖片！`);
            return;
        }
        uploadedFiles = [...uploadedFiles, ...validFiles];
        statusText.innerText = `已載入 ${uploadedFiles.length} 張圖片，準備就緒。`;
        processBtn.disabled = uploadedFiles.length === 0;
    };

    uploadArea.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => handleFiles(e.target.files));
    window.addEventListener('paste', (e) => {
        if (e.clipboardData.files.length > 0) handleFiles(e.clipboardData.files);
    });

    // 核心處理邏輯
    processBtn.addEventListener('click', async () => {
        const keywordsInput = document.getElementById('keywords').value;
        if (!keywordsInput) {
            alert('請輸入至少一個關鍵字！');
            return;
        }
        const keywords = keywordsInput.split(',').map(k => k.trim()).filter(k => k);
        const lang = document.getElementById('lang').value;
        const maskType = maskTypeSelect.value;
        const replaceText = document.getElementById('replaceText').value;
        const padding = parseInt(document.getElementById('padding').value) || 0;

        processBtn.disabled = true;
        progressBar.style.display = 'block';
        gallery.innerHTML = '';
        processedImages = [];

        statusText.innerText = '正在初始化 AI 文字辨識引擎 (首次載入語言包需較長時間)...';
        
        try {
            const worker = await Tesseract.createWorker(lang);
            
            for (let i = 0; i < uploadedFiles.length; i++) {
                const file = uploadedFiles[i];
                statusText.innerText = `正在處理第 ${i + 1} / ${uploadedFiles.length} 張圖片...`;
                progressFill.style.width = `${((i) / uploadedFiles.length) * 100}%`;

                // 讀取圖片到 Canvas
                const img = await createImageBitmap(file);
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);

                // 進行 OCR 辨識
                const { data: { words } } = await worker.recognize(canvas);

                words.forEach(word => {
                    const text = word.text;
                    // 檢查是否包含關鍵字
                    if (keywords.some(kw => text.includes(kw))) {
                        let { x0, y0, x1, y1 } = word.bbox;
                        // 加入 Padding
                        x0 = Math.max(0, x0 - padding);
                        y0 = Math.max(0, y0 - padding);
                        const w = Math.min(canvas.width - x0, x1 - x0 + padding * 2);
                        const h = Math.min(canvas.height - y0, y1 - y0 + padding * 2);

                        // 決定背景色
                        let bgColor = '#000000'; // 預設黑
                        if (maskType === 'color' || maskType === 'replace') {
                            // 抓取邊緣顏色作為底色 (簡單取左上角往外一點的像素)
                            const pixelData = ctx.getImageData(Math.max(0, x0 - 2), Math.max(0, y0 - 2), 1, 1).data;
                            bgColor = `rgb(${pixelData[0]}, ${pixelData[1]}, ${pixelData[2]})`;
                        }

                        // 畫色塊
                        ctx.fillStyle = bgColor;
                        ctx.fillRect(x0, y0, w, h);

                        // 如果是替換文字，把字寫上去
                        if (maskType === 'replace') {
                            ctx.fillStyle = getContrastYIQ(bgColor); // 計算文字顏色要深還淺
                            ctx.font = `bold ${h * 0.8}px Arial`;
                            ctx.textAlign = 'center';
                            ctx.textBaseline = 'middle';
                            ctx.fillText(replaceText, x0 + w / 2, y0 + h / 2);
                        }
                    }
                });

                // 顯示到畫廊
                const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
                processedImages.push({ name: `processed_${file.name}`, data: dataUrl });
                renderCard(dataUrl, `processed_${file.name}`);
            }

            await worker.terminate();
            progressFill.style.width = '100%';
            statusText.innerText = '處理完成！';
            downloadZipBtn.style.display = 'inline-block';

        } catch (error) {
            statusText.innerText = '處理發生錯誤：' + error.message;
            console.error(error);
        } finally {
            processBtn.disabled = false;
        }
    });

    // 渲染圖片卡片
    function renderCard(dataUrl, filename) {
        const div = document.createElement('div');
        div.className = 'img-card';
        div.innerHTML = `
            <img src="${dataUrl}" style="max-width:100%; border-radius:4px; margin-bottom:10px;">
            <a href="${dataUrl}" download="${filename}" style="display:block; text-align:center; background:var(--primary); color:#fff; text-decoration:none; padding:8px; border-radius:4px;">單張下載</a>
        `;
        gallery.appendChild(div);
    }

    // 計算對比色 (用來決定文字該用白還是黑)
    function getContrastYIQ(rgbStr){
        const rgb = rgbStr.match(/\d+/g);
        if(!rgb) return '#000';
        const yiq = ((rgb[0]*299)+(rgb[1]*587)+(rgb[2]*114))/1000;
        return (yiq >= 128) ? '#000000' : '#FFFFFF';
    }

    // 下載 ZIP
    downloadZipBtn.addEventListener('click', () => {
        const zip = new JSZip();
        processedImages.forEach(img => {
            const base64Data = img.data.split(',')[1];
            zip.file(img.name, base64Data, {base64: true});
        });
        zip.generateAsync({type:"blob"}).then(content => {
            const a = document.createElement("a");
            a.href = URL.createObjectURL(content);
            a.download = "processed_images.zip";
            a.click();
        });
    });

</script>
</body>
</html>
